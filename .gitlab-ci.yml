default:
  tags:
    - kazan-M

image: artifactory.core.emea.giservices.io/local-ogone-docker-ogone-ci/build/node/sonarqube:22

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

include:
  - project: "sdks/direct/templates"
    ref: main
    file: "github/github_push.yml"
  - project: "sdks/direct/templates"
    ref: main
    file: "github/github_tag.yml"
  - project: "sdks/direct/templates"
    ref: main
    file: "github/github_release.yml"
  - project: "sdks/direct/templates"
    ref: main
    file: "rollback/github_rollback_delete_tag.yml"
  - project: "sdks/direct/templates"
    ref: main
    file: "rollback/github_rollback_delete_release.yml"

stages:
  - prepare
  - verify
  - publish
  - .post

variables:
  SDK_NAME: "JavaScript"
  DRY_RUN: "false"

before_script:
  - set -eu
  - corepack enable
  - yarn config set network-timeout 60000
  - yarn config set network-concurrency 8

cache:
  key:
    files:
      - yarn.lock
  paths:
    - node_modules/
    - .yarn-cache/
  policy: pull-push

lint:
  stage: prepare
  script:
    - echo "Running lint for ${SDK_NAME} SDK"
    - yarn install --frozen-lockfile --prefer-offline --non-interactive
    - yarn run lint
  resource_group: pipeline-lock

build:
  stage: prepare
  needs:
    - lint
  script:
    - "echo Node version: $(node -v)"
    - "echo Yarn version: $(yarn -v)"
    - echo "Building ${SDK_NAME} SDK"
    - yarn install --frozen-lockfile --prefer-offline --non-interactive --production=false --cache-folder .yarn-cache
    - yarn build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  resource_group: pipeline-lock

security_audit:
  stage: verify
  needs:
    - build
  script:
    - echo "Running security audit for $SDK_NAME SDK"
    - yarn run audit
  resource_group: pipeline-lock

unit_test:
  stage: verify
  needs:
    - security_audit
  script:
    - echo "Running unit tests for $SDK_NAME SDK"
    - yarn install --frozen-lockfile --prefer-offline --non-interactive --production=false
    - yarn test:unit -- --coverage
  artifacts:
    paths:
      - coverage/
  resource_group: pipeline-lock

integration_test:
  stage: verify
  needs:
    - security_audit
  script:
    - echo "Running integration tests for $SDK_NAME SDK"
    - |
      cat > .env <<EOF
      VITE_ONLINEPAYMENTS_SDK_MERCHANT_ID=$TEST_CREDENTIALS_MERCHANT_ID
      VITE_ONLINEPAYMENTS_SDK_API_ID=$TEST_CREDENTIALS_API_ID
      VITE_ONLINEPAYMENTS_SDK_API_SECRET=$TEST_CREDENTIALS_API_SECRET
      VITE_ONLINEPAYMENTS_SDK_HOST=payment.preprod.direct.worldline-solutions.com
      VITE_PARTIAL_CREDIT_CARD_NUMBER_WITH_SURCHARGE_CURRENCY_CONVERSION=4567350000427977
      VITE_PARTIAL_CREDIT_CARD_NUMBER_WITHOUT_SURCHARGE_CURRENCY_CONVERSION=4242424242424242
      VITE_PRODUCT_ID_WITH_SURCHARGE_CURRENCY_CONVERSION=302
      VITE_PRODUCT_ID_WITHOUT_SURCHARGE_CURRENCY_CONVERSION=2
      VITE_PRODUCT_TYPE_ID_SURCHARGE_CURRENCY_CONVERSION=12
      VITE_PRODUCT_TYPE_VERSION_SURCHARGE_CURRENCY_CONVERSION=v2
      VITE_CARD_TOKEN_WITH_SURCHARGE_CURRENCY_CONVERSION=5bf3da321c3745b08c407143b1beb506
      EOF
    - yarn install --frozen-lockfile --prefer-offline --non-interactive --production=false
    - yarn test:integration
  after_script:
    - rm -f .env
    - rm -rf tests/integration/.cache
  resource_group: pipeline-lock

sonar_scan:
  stage: verify
  needs:
    - integration_test
    - unit_test
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [ "" ]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    policy: pull-push
    key: "sonar-cache-$CI_COMMIT_REF_SLUG"
    paths:
      - "${SONAR_USER_HOME}/cache"
  before_script: []
  script:
    - |
      sonar-scanner \
        -Dsonar.host.url="$SONAR_HOST_URL" \
        -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
        -Dsonar.token="$SONAR_TOKEN" \
        -Dsonar.qualitygate.wait=true \
        -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
        -Dsonar.javascript.node.maxspace=4096
  resource_group: pipeline-lock

extract_version_and_package:
  stage: publish
  needs:
    - build
    - sonar_scan
  script:
    - echo "Reading version from package.json"
    - VERSION=$(node -p "require('./package.json').version")
    - echo "VERSION=$VERSION" > version.env
    - yarn pack --filename package.tgz
    - |
      if [ ! -f package.tgz ]; then
        echo "Package was not created"
        exit 1
      fi
    - "echo Package created: package.tgz"
  artifacts:
    paths:
      - "*.tgz"
    reports:
      dotenv: version.env
    when: on_success
    expire_in: 1 week
  resource_group: pipeline-lock

check_version_not_published:
  stage: publish
  needs:
    - extract_version_and_package
  script:
    - echo "Checking if version $VERSION is already published to npm"
    - PACKAGE_NAME=$(node -p "require('./package.json').name")
    #Check if version exists on npm (exit code 0 = exists, non-zero = doesn't exist)
    - VERSION_EXISTS=$(npm view $PACKAGE_NAME@$VERSION version 2>/dev/null || echo 'not-found')
    - |
      if [ "$VERSION_EXISTS" != "not-found" ] && [ "$VERSION_EXISTS" == "$VERSION" ]; then
        echo "Version $VERSION is already published to npm. Skipping publish stages."
        export SKIP_PUBLISH=true >> skip_publish.env
      else
        echo "Version $VERSION is not yet published. Proceeding with release."
        export SKIP_PUBLISH=false >> skip_publish.env
      fi
  artifacts:
    reports:
      dotenv: skip_publish.env
  resource_group: pipeline-lock

github_push:
  stage: publish
  needs:
    - extract_version_and_package
    - check_version_not_published
  rules:
    - if: '$DRY_RUN == "true"'
      when: never
    - if: '$SKIP_PUBLISH == "true"'
      when: never
    - when: on_success
  script:
    - git config --global --add safe.directory "$CI_PROJECT_DIR"
    - echo "Pushing $SDK_NAME SDK to GitHub repositories"
    # Common variables
    - export SDK_VERSION="$VERSION"
    - export TAG_PREFIX="v"
    - export COMMIT_MESSAGE="Release version"
    # Worldline repository
    - export REPO_PATH="$WL_REPO_OWNER/$WL_REPO_NAME"
    - export GITHUB_TOKEN="$WL_GITHUB_TOKEN"
    - export GITHUB_USERNAME="$WL_GIT_USERNAME"
    - export GITHUB_EMAIL="$WL_GIT_EMAIL"
    - !reference [ .github_push_template, script ]
    # Whitelabel repository
    - export REPO_PATH="$OP_REPO_OWNER/$OP_REPO_NAME"
    - export GITHUB_TOKEN="$OP_GITHUB_TOKEN"
    - export GITHUB_USERNAME="$OP_GIT_USERNAME"
    - export GITHUB_EMAIL="$OP_GIT_EMAIL"
    - !reference [ .github_push_template, script ]
  resource_group: pipeline-lock

github_tag:
  stage: publish
  needs:
    - extract_version_and_package
    - check_version_not_published
    - github_push
  rules:
    - if: '$DRY_RUN == "true"'
      when: never
    - if: '$SKIP_PUBLISH == "true"'
      when: never
    - when: on_success
  script:
    - echo "Creating GitHub tags"
    # Common variables
    - export SDK_VERSION="$VERSION"
    - export TAG_PREFIX="v"
    # Worldline repository
    - export REPO_PATH="$WL_REPO_OWNER/$WL_REPO_NAME"
    - export GITHUB_TOKEN="$WL_GITHUB_TOKEN"
    - !reference [ .github_tag_template, script ]
    # Whitelabel repository
    - export REPO_PATH="$OP_REPO_OWNER/$OP_REPO_NAME"
    - export GITHUB_TOKEN="$OP_GITHUB_TOKEN"
    - !reference [ .github_tag_template, script ]
  resource_group: pipeline-lock

github_release:
  stage: publish
  needs:
    - job: extract_version_and_package
      artifacts: true
    - job: check_version_not_published
      artifacts: false
    - job: github_tag
      artifacts: false
  rules:
    - if: '$DRY_RUN == "true"'
      when: never
    - if: '$SKIP_PUBLISH == "true"'
      when: never
    - when: on_success
  script:
    - echo "Creating GitHub releases"
    # Common variables
    - export SDK_VERSION="$VERSION"
    - export TAG_PREFIX="v"
    - export ARTIFACT_PATHS="package.tgz"
    # Worldline repository
    - export REPO_PATH="$WL_REPO_OWNER/$WL_REPO_NAME"
    - export GITHUB_TOKEN="$WL_GITHUB_TOKEN"
    - !reference [ .github_release_template, script ]
    # Whitelabel repository
    - export REPO_PATH="$OP_REPO_OWNER/$OP_REPO_NAME"
    - export GITHUB_TOKEN="$OP_GITHUB_TOKEN"
    - !reference [ .github_release_template, script ]
  resource_group: pipeline-lock

publish_package_manager:
  stage: publish
  needs:
    - extract_version_and_package
    - check_version_not_published
    - github_release
  rules:
    - if: '$DRY_RUN == "true"'
      when: never
    - if: '$SKIP_PUBLISH == "true"'
      when: never
    - when: on_success
  script:
    - |
      echo "Publishing ${SDK_NAME} SDK to npmjs.com"

      [ -z "$NPM_PUBLISH_TOKEN" ] && echo "ERROR: NPM_PUBLISH_TOKEN is empty!" && exit 1

      REGISTRY_URL="https://www.npmjs.com/package/onlinepayments-sdk-client-js"
      REGISTRY_HOST="registry.npmjs.org"
      
      rm -f .npmrc ~/.npmrc
      echo "registry=${REGISTRY_URL}" > ~/.npmrc
      echo "//${REGISTRY_HOST}/:_authToken=${NPM_PUBLISH_TOKEN}" >> ~/.npmrc

      echo "--- .npmrc content (token masked) ---"
      cat ~/.npmrc | sed 's/_auth=.*/_auth=***MASKED***/'
      
      echo "--- Publishing package ---"
      npm publish package.tgz --registry="${REGISTRY_URL}"

      rm -f ~/.npmrc
  resource_group: pipeline-lock
  after_script:
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        echo "JavaScript SDK published successfully. Version: v$VERSION"
      else
        echo "JavaScript SDK build and publish pipeline FAILED"
      fi
      
rollback_on_release_failure:
  stage: .post
  needs:
    - job: github_release
      artifacts: false
    - job: extract_version_and_package
      artifacts: true
  image: docker.io/alpine/curl:latest
  allow_failure: true
  before_script: [ ]
  rules:
    - if: '$DRY_RUN == "true"'
      when: never
    - when: on_failure
  script:
    # Worldline
    - export REPO_PATH="$WL_REPO_OWNER/$WL_REPO_NAME"
    - export GITHUB_TOKEN="$WL_GITHUB_TOKEN"
    - export SDK_VERSION="$VERSION"
    - export TAG_PREFIX="v"
    - !reference [ .github_rollback_delete_tag_template, script ]
    # Whitelabel
    - export REPO_PATH="$OP_REPO_OWNER/$OP_REPO_NAME"
    - export GITHUB_TOKEN="$OP_GITHUB_TOKEN"
    - export SDK_VERSION="$VERSION"
    - !reference [ .github_rollback_delete_tag_template, script ]

rollback_on_publish_failure:
  stage: .post
  needs:
    - job: publish_package_manager
      artifacts: false
    - job: extract_version_and_package
      artifacts: true
  image: docker.io/alpine/curl:latest
  allow_failure: true
  before_script: [ ]
  rules:
    - if: '$DRY_RUN == "true"'
      when: never
    - when: on_failure
  script:
    # Worldline - delete release then tag
    - export REPO_PATH="$WL_REPO_OWNER/$WL_REPO_NAME"
    - export GITHUB_TOKEN="$WL_GITHUB_TOKEN"
    - export SDK_VERSION="$VERSION"
    - export TAG_PREFIX="v"
    - !reference [ .github_rollback_delete_release_template, script ]
    - !reference [ .github_rollback_delete_tag_template, script ]
    # Whitelabel - delete release then tag
    - export REPO_PATH="$OP_REPO_OWNER/$OP_REPO_NAME"
    - export GITHUB_TOKEN="$OP_GITHUB_TOKEN"
    - export SDK_VERSION="$VERSION"
    - !reference [ .github_rollback_delete_release_template, script ]
    - !reference [ .github_rollback_delete_tag_template, script ]